# =============================================================================
# RDAE MVP Stage 1 Configuration v2 (2026-06-03)
# Updated for architecture v2:
#   - Frozen ViT + Perceiver Resampler + Causal Transformer
#   - DDIM 10-step sampling
#   - Temporal Sensor Decoder with contact detection
# =============================================================================

# --- Model (v2 architecture) ---
model:
  # Visual encoder (frozen)
  vit_model: "google/vit-base-patch16-224"
  freeze_vit: true

  # Perceiver Resampler
  perceiver:
    num_latents: 64
    num_layers: 2

  # Causal World Transformer
  transformer:
    dim: 384
    num_layers: 8
    num_heads: 12
    dropout: 0.1

  # World latent
  world_latent_dim: 256

  # Action decoder (DDIM)
  action_dim: 7
  action_horizon: 16
  execution_horizon: 4
  diffusion_steps: 100          # total forward process steps
  ddim_steps: 10                # sampling steps (10× faster)
  ddim_eta: 0.0                 # 0 = deterministic DDIM

  # Sensor decoder
  sensor:
    joint_dim: 7
    temporal_layers: 2
    temporal_heads: 8
    temporal_hidden: 256
    inv_feat_dim: 384

  # Input
  state_dim: 14                 # 7 joint angles + 7 velocities
  frame_stack: 4                # number of past frames for temporal context

# --- Training ---
training:
  batch_size: 32                # reduced for larger model
  learning_rate: 1.0e-4
  weight_decay: 1.0e-5
  warmup_steps: 2000
  max_steps: 1_000_000
  grad_clip_norm: 1.0

  # Multi-task loss weights
  loss_weights:
    action_mse: 1.0             # diffusion noise prediction
    joint_pos: 0.5              # joint position MSE
    joint_vel: 0.3              # joint velocity MSE
    force: 0.5                  # force MAE
    contact: 0.3                # contact BCE
    physics: 0.1                # physics consistency
    video_mse: 0.2              # auxiliary: future frame prediction

  # Logging
  log_interval: 50
  eval_interval: 5000
  save_interval: 10000

  checkpoint_dir: "checkpoints"
  log_dir: "logs"

# --- Data ---
data:
  real_dataset: "bridge_v2"
  real_data_path: "./data/real/"
  video_dataset: null
  video_data_path: null

  image_size: [224, 224]
  normalize: true
  frame_stack: 4                # must match model.frame_stack
  action_horizon: 16

  num_workers: 4
  prefetch_factor: 2
  pin_memory: true

# --- Simulation ---
simulation:
  engine: "mujoco"
  timestep: 0.002
  consistency_thresholds:
    pose_error_cm: 5.0
    force_error_n: 0.5
    joint_error_rad: 0.1
    contact_accuracy: 0.7       # min contact detection accuracy

# --- Hardware ---
hardware:
  device: "cuda"
  gpu_ids: [0]
  mixed_precision: "fp16"
  compile_model: false
  grad_accumulation: 2          # effective batch_size = 32 × 2 = 64
